<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado SEDUC CE - Banca FUNECE - LDB: Recursos Financeiros</title>
    <style>
        /* Variáveis de Cores e Estilo */
        :root {
            --cor-primaria: #0a3d62;
            --cor-secundaria: #3c6382;
            --cor-acento: #079992;
            --cor-fundo: #f4f6f8;
            --cor-texto: #2d3436;
            --cor-borda: #dcdde1;
            
            --cor-sucesso: #27ae60;
            --cor-sucesso-fundo: #e8f8f5;
            --cor-erro: #e74c3c;
            --cor-erro-fundo: #fdf2e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        /* Cabeçalho Fixo */
        header {
            background-color: var(--cor-primaria);
            color: white;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-info h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-info p {
            font-size: 0.85rem;
            color: #d1d8e0;
        }

        .painel-status {
            display: flex;
            gap: 20px;
            background-color: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Container do Simulado */
        main {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Cartão de Questão */
        .questao-card {
            background-color: white;
            border: 1px solid var(--cor-borda);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }

        .questao-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--cor-borda);
            padding-bottom: 10px;
        }

        .questao-numero {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--cor-secundaria);
        }

        .enunciado {
            font-size: 1.05rem;
            margin-bottom: 25px;
            text-align: justify;
        }

        .itens-romanos {
            margin: 15px 0 20px 30px;
            list-style: none;
        }

        .itens-romanos li {
            margin-bottom: 10px;
            position: relative;
        }

        .itens-romanos li::before {
            content: "•";
            color: var(--cor-acento);
            position: absolute;
            left: -20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Alternativas */
        .alternativas {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alternativa {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 2px solid var(--cor-borda);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #fff;
        }

        .alternativa:hover {
            border-color: var(--cor-secundaria);
            background-color: #f1f5f8;
        }

        .letra-alt {
            font-weight: bold;
            color: var(--cor-primaria);
            background-color: #f1f5f8;
            border: 1px solid var(--cor-borda);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        /* Estados das Respostas */
        .bloqueado {
            pointer-events: none;
        }

        .alternativa.correta {
            background-color: var(--cor-sucesso-fundo);
            border-color: var(--cor-sucesso);
        }

        .alternativa.correta .letra-alt {
            background-color: var(--cor-sucesso);
            color: white;
            border-color: var(--cor-sucesso);
        }

        .alternativa.incorreta {
            background-color: var(--cor-erro-fundo);
            border-color: var(--cor-erro);
        }

        .alternativa.incorreta .letra-alt {
            background-color: var(--cor-erro);
            color: white;
            border-color: var(--cor-erro);
        }

        /* Comentário do Professor */
        .feedback {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #eaf2f8;
            border-left: 5px solid var(--cor-secundaria);
            border-radius: 0 6px 6px 0;
            animation: fadeIn 0.5s;
        }

        .feedback h4 {
            color: var(--cor-primaria);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feedback p {
            font-size: 0.95rem;
            color: #34495e;
            text-align: justify;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modal de Resultado */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            color: var(--cor-primaria);
            margin-bottom: 20px;
        }

        .resultado-box {
            background-color: var(--cor-fundo);
            border: 2px solid var(--cor-borda);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .nota-final {
            font-size: 3rem;
            font-weight: bold;
            color: var(--cor-acento);
            line-height: 1;
            margin-bottom: 10px;
        }

        .btn-reiniciar {
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: bold;
        }

        .btn-reiniciar:hover {
            background-color: var(--cor-secundaria);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <h1>Simulado FUNECE - SEDUC CE</h1>
            <p>LDB - Título VII: Dos Recursos Financeiros</p>
        </div>
        <div class="painel-status">
            <div>Progresso: <span id="contador-questoes">0/10</span></div>
            <div>⏱️ <span id="cronometro">00:00</span></div>
        </div>
    </header>

    <main id="container-questoes">
        <!-- Questões serão geradas via JS -->
    </main>

    <!-- Modal Final -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2>Simulado Concluído!</h2>
            <div class="resultado-box">
                <div class="nota-final"><span id="pontuacao"></span>/10</div>
                <div style="font-size: 1.1rem; color: var(--cor-texto);">
                    Tempo Total: <strong id="tempo-final"></strong>
                </div>
            </div>
            <button class="btn-reiniciar" onclick="location.reload()">Refazer Simulado</button>
        </div>
    </div>

    <script>
        // Banco de Questões (Perfil FUNECE/UECE)
        const questoes = [
            {
                enunciado: "De acordo com o art. 69 da LDB (Lei nº 9.394/1996), a vinculação constitucional de recursos para a manutenção e desenvolvimento do ensino (MDE) estabelece percentuais mínimos a serem aplicados pelos entes federativos. Sobre este dispositivo, assinale a alternativa correta:",
                alternativas: [
                    "A União, os Estados, o Distrito Federal e os Municípios aplicarão, anualmente, nunca menos de vinte e cinco por cento da receita resultante de impostos na MDE.",
                    "A União aplicará, anualmente, nunca menos de dezoito por cento, e os Estados, o Distrito Federal e os Municípios, vinte e cinco por cento da receita resultante de impostos, compreendidas as transferências constitucionais.",
                    "O cálculo do percentual da União abrange exclusivamente os impostos de sua competência residual, excluídas as transferências constitucionais ao FUNDEB.",
                    "As operações de crédito por antecipação de receita orçamentária de impostos devem ser incluídas no cálculo da base de receita de impostos mencionada na Lei."
                ],
                correta: 1,
                comentario: "<strong>Gabarito: B.</strong> A assertiva traz a literalidade do *caput* do art. 69 da LDB. A alternativa A erra ao colocar 25% para a União. A alternativa C inventa regras não previstas. A alternativa D contraria o § 2º do art. 69, que diz expressamente que as operações de crédito por antecipação de receita de impostos são EXCLUÍDAS do cálculo."
            },
            {
                enunciado: "O legislador estabeleceu limites rigorosos quanto ao que pode ou não ser considerado despesa de Manutenção e Desenvolvimento do Ensino (MDE). Com base no art. 71 da LDB, julgue os itens a seguir:<br><br><ul class='itens-romanos'><li>I. As despesas com programas suplementares de alimentação e assistência médico-odontológica constituem despesas de MDE, dado o seu caráter indissociável da permanência do aluno na escola.</li><li>II. Obras de infraestrutura, ainda que realizadas para beneficiar diretamente a rede escolar, não constituem despesas de MDE.</li><li>III. A subvenção a instituições públicas ou privadas de caráter desportivo, mesmo que frequentadas por alunos da rede pública, não constitui despesa de MDE.</li></ul>É correto o que se afirma em:",
                alternativas: [
                    "I e II, apenas.",
                    "II e III, apenas.",
                    "I e III, apenas.",
                    "I, II e III."
                ],
                correta: 1,
                comentario: "<strong>Gabarito: B.</strong> O item I é FALSO. Segundo o art. 71, inciso IV, programas suplementares de alimentação (merenda), assistência médica, odontológica e farmacêutica NÃO são despesas de MDE (embora sejam importantes, saem de rubricas orçamentárias de assistência/saúde, não da educação). Os itens II e III estão corretos, conforme incisos V e II do mesmo artigo."
            },
            {
                enunciado: "O art. 69, § 5º da LDB, com o intuito de proteger o fluxo de caixa da educação e evitar o contingenciamento ilícito por parte do Executivo, estipula prazos para o repasse imediato dos valores arrecadados ao órgão responsável pela educação. Um recurso arrecadado no dia 05 de determinado mês deverá ser repassado ao órgão da educação, impreterivelmente, até o dia:",
                alternativas: [
                    "10 do mesmo mês.",
                    "20 do mesmo mês.",
                    "30 do mesmo mês.",
                    "10 do mês subsequente."
                ],
                correta: 1,
                comentario: "<strong>Gabarito: B.</strong> Conforme o art. 69, § 5º, inciso I: recursos arrecadados do primeiro (1º) ao décimo (10º) dia de cada mês devem ser repassados até o <strong>vigésimo (20º) dia</strong>."
            },
            {
                enunciado: "A Lei nº 15.001/2024 introduziu novas regras de transparência e *compliance* na gestão dos recursos públicos destinados à educação, notadamente para escolas comunitárias, confessionais ou filantrópicas (art. 77 da LDB). Dentre as inovações, é VEDADO destinar recursos públicos a entidades que:",
                alternativas: [
                    "Tenham como dirigente agente político de Poder, dirigente de órgão da administração pública ou seu cônjuge e parentes até o terceiro grau.",
                    "Mantenham projetos de parceria público-privada com o Ministério Público Estadual para o combate à evasão escolar.",
                    "Apliquem seus excedentes financeiros em infraestrutura esportiva, desde que comprovada a finalidade educativa.",
                    "Destinem seu patrimônio, no caso de encerramento de suas atividades, exclusivamente ao Poder Público municipal."
                ],
                correta: 0,
                comentario: "<strong>Gabarito: A.</strong> A Lei 15.001/2024 incluiu o inciso V no art. 77, vedando o repasse a escolas comunitárias, filantrópicas ou confessionais cujos dirigentes sejam agentes políticos, membros do Ministério Público, dirigentes de órgãos da administração, bem como seus cônjuges ou parentes até o 3º grau. O objetivo é evitar conflito de interesses e nepotismo disfarçado."
            },
            {
                enunciado: "Assinale a alternativa que elenca, de forma correta e respaldada pelo art. 70 da LDB (incluindo as alterações da Lei nº 14.560/2023), ações que são legalmente consideradas como despesas de manutenção e desenvolvimento do ensino (MDE):",
                alternativas: [
                    "Formação de quadros especiais para a administração pública, de natureza civil ou diplomática.",
                    "Aquisição de material didático-escolar e manutenção de programas de transporte escolar.",
                    "Pagamento de pessoal docente, mesmo quando em desvio de função, desde que lotados na Secretaria de Educação.",
                    "Pesquisa não vinculada às instituições de ensino, desde que aborde temas transversais aos Parâmetros Curriculares Nacionais."
                ],
                correta: 1,
                comentario: "<strong>Gabarito: B.</strong> A aquisição de material didático-escolar e a manutenção do transporte escolar SÃO consideradas despesas de MDE (Art. 70, VIII). As alternativas A, C e D representam exatamente o oposto: ações que NÃO constituem despesas de MDE, conforme os incisos III, VI e I do art. 71, respectivamente."
            },
            {
                enunciado: "A LDB institui o princípio da 'Ação Supletiva e Redistributiva' (art. 75). Acerca deste mecanismo federativo, julgue as afirmativas:<br><br><ul class='itens-romanos'><li>I. A ação supletiva da União e dos Estados tem como objetivo corrigir progressivamente as disparidades de acesso e garantir o padrão mínimo de qualidade de ensino.</li><li>II. A capacidade de atendimento de cada governo é definida pela razão entre a receita corrente líquida e o total de repasses do FUNDEB.</li><li>III. A ação supletiva e redistributiva será sumariamente negada ao ente federativo que oferecer vagas em número inferior à sua capacidade de atendimento na área de ensino de sua responsabilidade.</li></ul>Estão corretas as afirmativas:",
                alternativas: [
                    "I e II, apenas.",
                    "I e III, apenas.",
                    "II e III, apenas.",
                    "I, II e III."
                ],
                correta: 1,
                comentario: "<strong>Gabarito: B.</strong> O item I está correto (Art. 75, caput). O item III está correto (Art. 75, § 4º), configurando uma 'punição' ao ente que não cumpre sua obrigação prioritária. O item II é falso: a lei (Art. 75, § 2º) define a capacidade de atendimento pela razão entre os recursos de uso constitucionalmente obrigatório na MDE e o custo anual do aluno, e não pela receita corrente líquida."
            },
            {
                enunciado: "Sobre a transparência e a prestação de contas dos recursos destinados à educação, avalie o que determina a redação atual do art. 72 da LDB (dada pela Lei nº 15.001/2024) e assinale a opção INCORRETA:",
                alternativas: [
                    "As receitas e as despesas com MDE serão apuradas e publicadas nos balanços do poder público.",
                    "A publicação deve ocorrer, obrigatoriamente, nos sítios eletrônicos do Ministério da Educação e dos órgãos gestores da educação pública subnacionais.",
                    "Deverão ser publicados de forma genérica e consolidada os dados relativos à gestão e execução dos recursos do FUNDEB, visando proteger dados sensíveis dos municípios.",
                    "Deverão ser publicados de forma específica os repasses de recursos públicos a instituições de ensino conveniadas para oferta da educação escolar."
                ],
                correta: 2,
                comentario: "<strong>Gabarito: C.</strong> A alternativa C está incorreta porque o parágrafo único do art. 72 exige que os dados sejam publicados de forma <strong>específica</strong> (e não genérica ou consolidada), incluindo obrigatoriamente a gestão e execução dos recursos do FUNDEB (inciso II)."
            },
            {
                enunciado: "O Título VII da LDB regulamenta a possibilidade de destinação de recursos públicos (incluindo bolsas de estudo) para o setor não público da educação (art. 77). Acerca desta prerrogativa, assinale a condicionalidade exigida pela legislação para o repasse desses recursos:",
                alternativas: [
                    "As escolas devem assegurar a destinação de seu patrimônio exclusivamente aos sócios cotistas no caso de encerramento das atividades.",
                    "A oferta de bolsas de estudo na educação básica na rede filantrópica deve ocorrer quando houver falta de vagas na rede pública, ficando o Poder Público obrigado a investir prioritariamente na expansão de sua própria rede.",
                    "As escolas comunitárias e confessionais ficam isentas de prestar contas ao Tribunal de Contas, devendo apenas emitir relatórios internos de gestão aos pais de alunos.",
                    "É exigida a comprovação de finalidade lucrativa restrita, admitida a distribuição de dividendos limitada a 10% do superávit financeiro anual."
                ],
                correta: 1,
                comentario: "<strong>Gabarito: B.</strong> A alternativa reflete fielmente o disposto no § 1º do art. 77 da LDB. A alternativa A contraria a lei (patrimônio deve ir para outra escola comunitária/filantrópica ou Poder Público). A alternativa C é falsa (prestação de contas é obrigatória). A alternativa D é falsa (exige-se comprovação de finalidade NÃO-lucrativa)."
            },
            {
                enunciado: "Analise a situação hipotética: O município de 'Nova Esperança' contratou, com verbas da educação, profissionais para a formação de quadros de segurança patrimonial (guardas municipais) que farão rondas nas escolas. Além disso, utilizou a rubrica da educação para custear a realização de atividades curriculares complementares, como uma feira de ciências da natureza. À luz dos arts. 70 e 71 da LDB, é correto afirmar que:",
                alternativas: [
                    "Ambas as despesas são consideradas de Manutenção e Desenvolvimento do Ensino (MDE), por ocorrerem no ambiente escolar.",
                    "A formação de guardas municipais é despesa de MDE, mas a feira de ciências não possui amparo legal expresso como despesa de educação.",
                    "Nenhuma das despesas listadas pode ser apurada como Manutenção e Desenvolvimento do Ensino.",
                    "A feira de ciências é considerada despesa de MDE, mas a formação de quadros para a administração pública (guardas) não constitui despesa de MDE."
                ],
                correta: 3,
                comentario: "<strong>Gabarito: D.</strong> Feiras de ciências e atividades curriculares complementares foram explicitamente incluídas como despesas de MDE pela Lei nº 14.560/2023 (Art. 70, IX). Já a formação de quadros especiais para a administração pública (civis ou militares, como guardas municipais) é expressamente vedada como MDE pelo art. 71, III."
            },
            {
                enunciado: "Nos termos do art. 68 da LDB, constituem recursos públicos destinados à educação, EXCETO:",
                alternativas: [
                    "Receita de impostos próprios da União, dos Estados, do Distrito Federal e dos Municípios.",
                    "Receita do salário-educação e de outras contribuições sociais.",
                    "Receita oriunda de taxas e tarifas de serviços públicos não educacionais sob gestão estadual.",
                    "Receita de incentivos fiscais e de transferências constitucionais."
                ],
                correta: 2,
                comentario: "<strong>Gabarito: C.</strong> As taxas e tarifas de serviços públicos não educacionais (como água, luz, pedágios) não estão arroladas no art. 68 da LDB como origens de recursos destinados à educação. As alternativas A, B e D reproduzem literalmente os incisos I, II, III e IV do art. 68."
            }
        ];

        // Variáveis de Controle
        let tempoSegundos = 0;
        let intervaloTimer;
        let questoesRespondidas = 0;
        const totalQuestoes = questoes.length;
        const letras = ['A', 'B', 'C', 'D'];
        let nota = 0;

        // Elementos do DOM
        const containerQuestoes = document.getElementById('container-questoes');
        const spanCronometro = document.getElementById('cronometro');
        const spanContador = document.getElementById('contador-questoes');
        const modal = document.getElementById('modal');

        // Inicialização
        window.onload = () => {
            renderizarQuestoes();
            iniciarCronometro();
        };

        // Função para formatar o tempo (MM:SS)
        function formatarTempo(totalSegundos) {
            const minutos = Math.floor(totalSegundos / 60).toString().padStart(2, '0');
            const segundos = (totalSegundos % 60).toString().padStart(2, '0');
            return `${minutos}:${segundos}`;
        }

        // Lógica do Cronômetro
        function iniciarCronometro() {
            intervaloTimer = setInterval(() => {
                tempoSegundos++;
                spanCronometro.innerText = formatarTempo(tempoSegundos);
            }, 1000);
        }

        // Renderizar Questões no HTML
        function renderizarQuestoes() {
            questoes.forEach((q, indexQuestao) => {
                const card = document.createElement('div');
                card.className = 'questao-card';
                card.id = `q-${indexQuestao}`;

                // Cabeçalho da Questão
                let html = `
                    <div class="questao-header">
                        <div class="questao-numero">Questão ${indexQuestao + 1}</div>
                    </div>
                    <div class="enunciado">${q.enunciado}</div>
                    <div class="alternativas" id="alts-${indexQuestao}">
                `;

                // Alternativas
                q.alternativas.forEach((alt, indexAlt) => {
                    html += `
                        <div class="alternativa" id="alt-${indexQuestao}-${indexAlt}" onclick="selecionarResposta(${indexQuestao}, ${indexAlt})">
                            <div class="letra-alt">${letras[indexAlt]}</div>
                            <div>${alt}</div>
                        </div>
                    `;
                });

                // Bloco de Feedback (oculto por padrão)
                html += `
                    </div>
                    <div class="feedback" id="feedback-${indexQuestao}">
                        <h4>📘 Comentário do Professor</h4>
                        <p>${q.comentario}</p>
                    </div>
                `;

                card.innerHTML = html;
                containerQuestoes.appendChild(card);
            });
        }

        // Lógica de Validação da Resposta
        function selecionarResposta(indexQuestao, indexSelecionado) {
            const containerAlts = document.getElementById(`alts-${indexQuestao}`);
            const feedbackBox = document.getElementById(`feedback-${indexQuestao}`);
            const corretaIndex = questoes[indexQuestao].correta;

            // Bloquear a questão (evitar duplo clique)
            containerAlts.classList.add('bloqueado');

            // Analisar alternativas
            for (let i = 0; i < 4; i++) {
                const altDiv = document.getElementById(`alt-${indexQuestao}-${i}`);
                
                if (i === corretaIndex) {
                    altDiv.classList.add('correta'); // Mostra a certa sempre em verde
                }
                
                if (i === indexSelecionado && i !== corretaIndex) {
                    altDiv.classList.add('incorreta'); // Se errou, pinta a clicada de vermelho
                }
            }

            // Computar nota
            if (indexSelecionado === corretaIndex) {
                nota++;
            }

            // Exibir Feedback
            feedbackBox.style.display = 'block';

            // Atualizar Progresso
            questoesRespondidas++;
            spanContador.innerText = `${questoesRespondidas}/${totalQuestoes}`;

            // Verificar se o simulado acabou
            if (questoesRespondidas === totalQuestoes) {
                finalizarSimulado();
            }
        }

        // Finalizar e exibir resultados
        function finalizarSimulado() {
            clearInterval(intervaloTimer); // Para o relógio
            
            setTimeout(() => {
                document.getElementById('pontuacao').innerText = nota;
                document.getElementById('tempo-final').innerText = formatarTempo(tempoSegundos);
                modal.style.display = 'flex'; // Exibe o modal
            }, 800); // Pequeno atraso para o aluno ver a última resposta
        }

    </script>
</body>
</html>
